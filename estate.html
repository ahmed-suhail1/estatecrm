<!DOCTYPE html>
<html lang="tr" class="h-full bg-gray-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emlak CRM - 6 Agent Office</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .sidebar-link.active {
      background-color: #1e293b;
      color: white;
    }
    .sidebar-link {
      transition: all 0.2s;
    }
    .modal-overlay {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
    }
    /* Hide scrollbar but keep functionality */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="h-full font-sans antialiased">

  <!-- ================================ -->
  <!-- LOGIN / SIGNUP PAGE (hidden when logged in) -->
  <!-- ================================ -->
  <div id="authPage" class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl shadow-xl">
      <div class="text-center">
        <h2 class="mt-6 text-3xl font-extrabold text-gray-900">Emlak CRM</h2>
        <p class="mt-2 text-sm text-gray-600">6 Kişilik Ofis Ekibiniz için</p>
      </div>
      <!-- Tabs -->
      <div class="flex border-b border-gray-200">
        <button id="loginTab" class="w-1/2 py-2 text-sm font-medium text-indigo-600 border-b-2 border-indigo-500">Giriş Yap</button>
        <button id="signupTab" class="w-1/2 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">Kayıt Ol</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="mt-8 space-y-6">
        <div class="rounded-md shadow-sm space-y-4">
          <div>
            <label class="sr-only">Email</label>
            <input type="email" id="loginEmail" required class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="Email adresiniz">
          </div>
          <div>
            <label class="sr-only">Şifre</label>
            <input type="password" id="loginPassword" required class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="Şifreniz">
          </div>
        </div>
        <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
          Giriş Yap
        </button>
        <p id="loginError" class="text-red-500 text-sm text-center hidden"></p>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="mt-8 space-y-6 hidden">
        <div class="rounded-md shadow-sm space-y-4">
          <div>
            <label class="sr-only">Ad Soyad</label>
            <input type="text" id="signupName" required class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="Ad Soyad">
          </div>
          <div>
            <label class="sr-only">Email</label>
            <input type="email" id="signupEmail" required class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="Email adresiniz">
          </div>
          <div>
            <label class="sr-only">Şifre (min 6)</label>
            <input type="password" id="signupPassword" required minlength="6" class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="Şifre (en az 6 karakter)">
          </div>
        </div>
        <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
          Kayıt Ol
        </button>
        <p id="signupError" class="text-red-500 text-sm text-center hidden"></p>
      </form>
    </div>
  </div>

  <!-- ================================ -->
  <!-- MAIN APP (hidden when logged out) -->
  <!-- ================================ -->
  <div id="appPage" class="hidden h-full flex">
    <!-- SIDEBAR -->
    <div class="w-64 bg-slate-800 text-white flex flex-col flex-shrink-0 h-screen sticky top-0">
      <div class="p-5 border-b border-slate-700">
        <h1 class="text-xl font-bold"><i class="fas fa-building mr-2"></i>Emlak CRM</h1>
        <p class="text-xs text-slate-400 mt-1" id="sidebarUser">Yükleniyor...</p>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="#" data-page="dashboard" class="sidebar-link active flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-700 hover:text-white transition"><i class="fas fa-chart-pie w-5"></i> Genel Bakış</a>
        <a href="#" data-page="properties" class="sidebar-link flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-700 hover:text-white transition"><i class="fas fa-home w-5"></i> Emlaklar</a>
        <a href="#" data-page="clients" class="sidebar-link flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-700 hover:text-white transition"><i class="fas fa-users w-5"></i> Müşteriler</a>
        <a href="#" data-page="tasks" class="sidebar-link flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-700 hover:text-white transition"><i class="fas fa-tasks w-5"></i> Görevler</a>
        <a href="#" data-page="team" class="sidebar-link flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-700 hover:text-white transition"><i class="fas fa-user-friends w-5"></i> Ekip</a>
      </nav>
      <div class="p-4 border-t border-slate-700">
        <button id="logoutBtn" class="w-full flex items-center px-3 py-2 rounded-lg text-sm text-red-400 hover:bg-slate-700 hover:text-red-300 transition"><i class="fas fa-sign-out-alt w-5"></i> Çıkış Yap</button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 overflow-y-auto p-6 bg-gray-100 h-screen">
      <!-- Dynamic pages will be rendered here -->
      <div id="pageContent"></div>
    </div>
  </div>

  <!-- ================================ -->
  <!-- GENERIC MODAL (Reusable) -->
  <!-- ================================ -->
  <div id="appModal" class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto p-6 relative">
      <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- ================================ -->
  <!-- JAVASCRIPT -->
  <!-- ================================ -->
  <script>
    // ============================================================
    // 1. CONFIGURE SUPABASE (REPLACE THESE!)
    // ============================================================
    const SUPABASE_URL = 'YOUR_SUPABASE_URL'; // e.g. https://xxxxx.supabase.co
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================================
    // 2. STATE
    // ============================================================
    let currentUser = null;
    let currentProfile = null;
    let agentsList = []; // for dropdowns

    // ============================================================
    // 3. DOM REFS
    // ============================================================
    const authPage = document.getElementById('authPage');
    const appPage = document.getElementById('appPage');
    const pageContent = document.getElementById('pageContent');
    const sidebarUser = document.getElementById('sidebarUser');

    // Auth tabs
    const loginTab = document.getElementById('loginTab');
    const signupTab = document.getElementById('signupTab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    // ============================================================
    // 4. AUTH LOGIC
    // ============================================================
    loginTab.addEventListener('click', () => {
      loginTab.className = 'w-1/2 py-2 text-sm font-medium text-indigo-600 border-b-2 border-indigo-500';
      signupTab.className = 'w-1/2 py-2 text-sm font-medium text-gray-500 hover:text-gray-700';
      loginForm.classList.remove('hidden');
      signupForm.classList.add('hidden');
    });
    signupTab.addEventListener('click', () => {
      signupTab.className = 'w-1/2 py-2 text-sm font-medium text-indigo-600 border-b-2 border-indigo-500';
      loginTab.className = 'w-1/2 py-2 text-sm font-medium text-gray-500 hover:text-gray-700';
      signupForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      errorEl.classList.add('hidden');
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) { errorEl.textContent = error.message; errorEl.classList.remove('hidden'); return; }
      window.location.reload(); // simple reload to fetch session
    });

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const errorEl = document.getElementById('signupError');
      errorEl.classList.add('hidden');
      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });
      if (error) { errorEl.textContent = error.message; errorEl.classList.remove('hidden'); return; }
      alert('Kayıt başarılı! Giriş yapabilirsiniz.');
      loginTab.click();
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.reload();
    });

    // ============================================================
    // 5. SESSION & PROFILE CHECK
    // ============================================================
    async function initSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        authPage.classList.remove('hidden');
        appPage.classList.add('hidden');
        return;
      }
      currentUser = session.user;
      authPage.classList.add('hidden');
      appPage.classList.remove('hidden');

      // Fetch profile
      const { data: profile } = await supabase
        .from('profiles')
        .select('*')
        .eq('id', currentUser.id)
        .single();
      currentProfile = profile;
      sidebarUser.textContent = profile?.full_name || currentUser.email;

      // Fetch all agents for dropdowns
      const { data: agents } = await supabase
        .from('profiles')
        .select('id, full_name');
      agentsList = agents || [];

      // Load default page
      navigateTo('dashboard');
    }

    // Listen for auth changes
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT' || !session) {
        window.location.reload();
      }
    });

    // ============================================================
    // 6. NAVIGATION
    // ============================================================
    document.querySelectorAll('.sidebar-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        const page = link.dataset.page;
        navigateTo(page);
      });
    });

    async function navigateTo(page) {
      switch (page) {
        case 'dashboard': await renderDashboard(); break;
        case 'properties': await renderProperties(); break;
        case 'clients': await renderClients(); break;
        case 'tasks': await renderTasks(); break;
        case 'team': await renderTeam(); break;
        default: pageContent.innerHTML = '<h1>404</h1>';
      }
    }

    // ============================================================
    // 7. HELPERS & MODAL
    // ============================================================
    function openModal(html) {
      document.getElementById('modalBody').innerHTML = html;
      document.getElementById('appModal').classList.remove('hidden');
    }
    window.closeModal = function() {
      document.getElementById('appModal').classList.add('hidden');
    };

    function getAgentName(id) {
      const a = agentsList.find(x => x.id === id);
      return a ? a.full_name : 'Atanmamış';
    }

    function currencySymbol(curr) {
      if (curr === 'TRY') return '₺';
      if (curr === 'USD') return '$';
      if (curr === 'EUR') return '€';
      return curr;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return d.toLocaleDateString('tr-TR');
    }

    function statusBadge(status) {
      const map = {
        'satilik': 'bg-blue-100 text-blue-800',
        'kiralik': 'bg-green-100 text-green-800',
        'pending': 'bg-yellow-100 text-yellow-800',
        'completed': 'bg-green-100 text-green-800',
        'cancelled': 'bg-red-100 text-red-800',
        'high': 'bg-red-100 text-red-800',
        'medium': 'bg-orange-100 text-orange-800',
        'low': 'bg-gray-100 text-gray-800'
      };
      return map[status] || 'bg-gray-100 text-gray-800';
    }

    // ============================================================
    // 8. DASHBOARD
    // ============================================================
    async function renderDashboard() {
      const [propsRes, clientsRes, tasksRes, interRes] = await Promise.all([
        supabase.from('properties').select('*', { count: 'exact' }),
        supabase.from('clients').select('*', { count: 'exact' }),
        supabase.from('tasks').select('*', { count: 'exact' }).eq('status', 'pending'),
        supabase.from('interactions').select('*', { count: 'exact' })
      ]);

      const totalProps = propsRes.count || 0;
      const totalClients = clientsRes.count || 0;
      const pendingTasks = tasksRes.count || 0;
      const totalInter = interRes.count || 0;

      pageContent.innerHTML = `
        <h2 class="text-2xl font-bold text-gray-800 mb-6">📊 Genel Bakış</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
          <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-indigo-500">
            <p class="text-sm text-gray-500">Toplam Emlak</p>
            <p class="text-3xl font-bold">${totalProps}</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
            <p class="text-sm text-gray-500">Toplam Müşteri</p>
            <p class="text-3xl font-bold">${totalClients}</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-yellow-500">
            <p class="text-sm text-gray-500">Bekleyen Görev</p>
            <p class="text-3xl font-bold">${pendingTasks}</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
            <p class="text-sm text-gray-500">Görüşme Kaydı</p>
            <p class="text-3xl font-bold">${totalInter}</p>
          </div>
        </div>
        <div class="mt-8 bg-white p-6 rounded-xl shadow-sm">
          <p class="text-sm text-gray-500">Hoş geldin, ${currentProfile?.full_name || 'Agent'}! Bugün ekibinle birlikte çalışmaya hazırsın.</p>
        </div>
      `;
    }

    // ============================================================
    // 9. PROPERTIES (CRUD)
    // ============================================================
    async function renderProperties() {
      const { data: properties, error } = await supabase
        .from('properties')
        .select('*, assigned_agent_id(id, full_name), created_by(id, full_name)')
        .order('created_at', { ascending: false });

      let rows = '';
      properties?.forEach(p => {
        rows += `
          <tr class="border-b hover:bg-gray-50">
            <td class="px-4 py-3 font-medium">${p.title}</td>
            <td class="px-4 py-3"><span class="px-2 py-1 text-xs rounded-full ${statusBadge(p.status)}">${p.status === 'satilik' ? 'Satılık' : 'Kiralık'}</span></td>
            <td class="px-4 py-3">${p.price} ${currencySymbol(p.currency)}</td>
            <td class="px-4 py-3">${p.city || '-'} / ${p.district || '-'}</td>
            <td class="px-4 py-3">${getAgentName(p.assigned_agent_id)}</td>
            <td class="px-4 py-3">
              <button onclick="editProperty('${p.id}')" class="text-indigo-600 hover:text-indigo-900 mr-2"><i class="fas fa-edit"></i></button>
              <button onclick="deleteProperty('${p.id}')" class="text-red-600 hover:text-red-900"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
        `;
      });

      pageContent.innerHTML = `
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold text-gray-800">🏠 Emlaklar</h2>
          <button onclick="showAddProperty()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium"><i class="fas fa-plus mr-2"></i>Yeni Emlak Ekle</button>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Başlık</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Durum</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Fiyat</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Lokasyon</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Sorumlu</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">İşlem</th>
              </tr>
            </thead>
            <tbody>${rows || '<tr><td colspan="6" class="text-center py-6 text-gray-400">Henüz emlak eklenmemiş.</td></tr>'}</tbody>
          </table>
        </div>
      `;
    }

    window.showAddProperty = function() {
      const agentOptions = agentsList.map(a => `<option value="${a.id}">${a.full_name}</option>`).join('');
      openModal(`
        <h3 class="text-xl font-bold mb-4">Yeni Emlak Ekle</h3>
        <form id="propertyForm" class="grid grid-cols-2 gap-4">
          <input type="text" name="title" placeholder="Başlık *" required class="col-span-2 border p-2 rounded"/>
          <select name="status" class="border p-2 rounded"><option value="satilik">Satılık</option><option value="kiralik">Kiralık</option></select>
          <select name="category" class="border p-2 rounded"><option value="konut">Konut</option><option value="isyeri">İş Yeri</option><option value="arsa">Arsa</option></select>
          <input type="number" name="price" placeholder="Fiyat" class="border p-2 rounded"/>
          <select name="currency" class="border p-2 rounded"><option value="TRY">TRY</option><option value="USD">USD</option><option value="EUR">EUR</option></select>
          <input type="text" name="city" placeholder="İl" class="border p-2 rounded"/>
          <input type="text" name="district" placeholder="İlçe" class="border p-2 rounded"/>
          <input type="text" name="neighborhood" placeholder="Mahalle" class="border p-2 rounded"/>
          <input type="text" name="address_detail" placeholder="Açık Adres" class="col-span-2 border p-2 rounded"/>
          <input type="number" name="net_m2" placeholder="Net m2" class="border p-2 rounded"/>
          <input type="number" name="gross_m2" placeholder="Brüt m2" class="border p-2 rounded"/>
          <input type="text" name="room_count" placeholder="Oda (örn: 3+1)" class="border p-2 rounded"/>
          <input type="text" name="floor" placeholder="Kat" class="border p-2 rounded"/>
          <input type="text" name="total_floors" placeholder="Toplam Kat" class="border p-2 rounded"/>
          <input type="text" name="building_year" placeholder="Yapım Yılı" class="border p-2 rounded"/>
          <input type="text" name="heating_type" placeholder="Isıtma (Kombi/Merkezi)" class="border p-2 rounded"/>
          <select name="tapu_durumu" class="border p-2 rounded"><option value="kat_mulkiyeti">Kat Mülkiyeti</option><option value="kat_irtifaki">Kat İrtifakı</option><option value="hisseli">Hisseli</option></select>
          <select name="iskan_durumu" class="border p-2 rounded"><option value="var">Var</option><option value="yok">Yok</option><option value="bekliyor">Bekliyor</option></select>
          <input type="date" name="dask_expiry_date" class="border p-2 rounded"/>
          <label class="flex items-center"><input type="checkbox" name="kentsel_donusum" value="true"/> Kentsel Dönüşüm</label>
          <label class="flex items-center"><input type="checkbox" name="kredi_uygun" value="true" checked/> Kredi Uygun</label>
          <input type="number" name="aidat" placeholder="Aidat" class="border p-2 rounded"/>
          <textarea name="description" placeholder="Açıklama" class="col-span-2 border p-2 rounded" rows="2"></textarea>
          <input type="text" name="owner_name" placeholder="Sahip Adı" class="border p-2 rounded"/>
          <input type="text" name="owner_phone" placeholder="Sahip Telefon" class="border p-2 rounded"/>
          <textarea name="owner_notes" placeholder="Sahip Notları" class="col-span-2 border p-2 rounded" rows="2"></textarea>
          <select name="assigned_agent_id" class="col-span-2 border p-2 rounded">
            <option value="">Sorumlu Agent Seç</option>
            ${agentOptions}
          </select>
          <div class="col-span-2 flex justify-end space-x-3 mt-4">
            <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded">İptal</button>
            <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded">Kaydet</button>
          </div>
        </form>
      `);

      document.getElementById('propertyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const data = new FormData(form);
        const payload = Object.fromEntries(data.entries());
        // handle checkboxes
        payload.kentsel_donusum = !!data.get('kentsel_donusum');
        payload.kredi_uygun = !!data.get('kredi_uygun');
        payload.price = parseFloat(payload.price) || 0;
        payload.aidat = parseFloat(payload.aidat) || 0;
        payload.created_by = currentUser.id;

        const { error } = await supabase.from('properties').insert([payload]);
        if (error) { alert('Hata: ' + error.message); return; }
        closeModal();
        renderProperties();
      });
    };

    window.editProperty = async function(id) {
      const { data: p, error } = await supabase.from('properties').select('*').eq('id', id).single();
      if (error) { alert('Veri alınamadı'); return; }
      const agentOptions = agentsList.map(a => 
        `<option value="${a.id}" ${a.id === p.assigned_agent_id ? 'selected' : ''}>${a.full_name}</option>`
      ).join('');
      // Simple edit modal - reuse same form but filled
      openModal(`
        <h3 class="text-xl font-bold mb-4">Emlak Düzenle</h3>
        <form id="editPropertyForm" class="grid grid-cols-2 gap-4">
          ${Object.keys(p).map(key => {
            if (['id','created_at','updated_at','created_by'].includes(key)) return '';
            const val = p[key] || '';
            if (key === 'kentsel_donusum' || key === 'kredi_uygun') {
              return `<label class="flex items-center col-span-2"><input type="checkbox" name="${key}" value="true" ${val ? 'checked' : ''}/> ${key === 'kentsel_donusum' ? 'Kentsel Dönüşüm' : 'Kredi Uygun'}</label>`;
            }
            if (key === 'assigned_agent_id') {
              return `<select name="${key}" class="col-span-2 border p-2 rounded"><option value="">Sorumlu Agent</option>${agentOptions}</select>`;
            }
            if (key === 'status') return `<select name="${key}" class="border p-2 rounded"><option value="satilik" ${val==='satilik'?'selected':''}>Satılık</option><option value="kiralik" ${val==='kiralik'?'selected':''}>Kiralık</option></select>`;
            if (key === 'category') return `<select name="${key}" class="border p-2 rounded"><option value="konut" ${val==='konut'?'selected':''}>Konut</option><option value="isyeri" ${val==='isyeri'?'selected':''}>İş Yeri</option><option value="arsa" ${val==='arsa'?'selected':''}>Arsa</option></select>`;
            if (key === 'currency') return `<select name="${key}" class="border p-2 rounded"><option value="TRY" ${val==='TRY'?'selected':''}>TRY</option><option value="USD" ${val==='USD'?'selected':''}>USD</option><option value="EUR" ${val==='EUR'?'selected':''}>EUR</option></select>`;
            if (key === 'tapu_durumu') return `<select name="${key}" class="border p-2 rounded"><option value="kat_mulkiyeti" ${val==='kat_mulkiyeti'?'selected':''}>Kat Mülkiyeti</option><option value="kat_irtifaki" ${val==='kat_irtifaki'?'selected':''}>Kat İrtifakı</option><option value="hisseli" ${val==='hisseli'?'selected':''}>Hisseli</option></select>`;
            if (key === 'iskan_durumu') return `<select name="${key}" class="border p-2 rounded"><option value="var" ${val==='var'?'selected':''}>Var</option><option value="yok" ${val==='yok'?'selected':''}>Yok</option><option value="bekliyor" ${val==='bekliyor'?'selected':''}>Bekliyor</option></select>`;
            if (key === 'dask_expiry_date') return `<input type="date" name="${key}" value="${val}" class="border p-2 rounded"/>`;
            if (key === 'description' || key === 'owner_notes') return `<textarea name="${key}" class="col-span-2 border p-2 rounded" rows="2">${val}</textarea>`;
            if (typeof val === 'boolean') return '';
            return `<input type="text" name="${key}" placeholder="${key}" value="${val}" class="border p-2 rounded ${['title','address_detail','owner_name','owner_phone','city','district','neighborhood','room_count','floor','total_floors','building_year','heating_type','orientation'].includes(key) ? '' : ''}"/>`;
          }).join('')}
          <div class="col-span-2 flex justify-end space-x-3 mt-4">
            <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded">İptal</button>
            <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded">Güncelle</button>
          </div>
        </form>
      `);
      document.getElementById('editPropertyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const data = new FormData(form);
        const payload = Object.fromEntries(data.entries());
        payload.kentsel_donusum = !!data.get('kentsel_donusum');
        payload.kredi_uygun = !!data.get('kredi_uygun');
        payload.price = parseFloat(payload.price) || 0;
        payload.aidat = parseFloat(payload.aidat) || 0;
        const { error } = await supabase.from('properties').update(payload).eq('id', id);
        if (error) { alert('Hata: ' + error.message); return; }
        closeModal();
        renderProperties();
      });
    };

    window.deleteProperty = async function(id) {
      if (!confirm('Bu emlağı silmek istediğinize emin misiniz?')) return;
      await supabase.from('properties').delete().eq('id', id);
      renderProperties();
    };

    // ============================================================
    // 10. CLIENTS (Simplified CRUD - similar pattern)
    // ============================================================
    async function renderClients() {
      const { data: clients } = await supabase
        .from('clients')
        .select('*, assigned_agent_id(id, full_name)')
        .order('created_at', { ascending: false });

      let rows = '';
      clients?.forEach(c => {
        rows += `
          <tr class="border-b hover:bg-gray-50">
            <td class="px-4 py-3">${c.first_name} ${c.last_name}</td>
            <td class="px-4 py-3">${c.phone}</td>
            <td class="px-4 py-3">${c.client_type || '-'}</td>
            <td class="px-4 py-3">${c.lead_source || '-'}</td>
            <td class="px-4 py-3">${getAgentName(c.assigned_agent_id)}</td>
            <td class="px-4 py-3">
              <button onclick="editClient('${c.id}')" class="text-indigo-600 hover:text-indigo-900 mr-2"><i class="fas fa-edit"></i></button>
              <button onclick="deleteClient('${c.id}')" class="text-red-600 hover:text-red-900"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
        `;
      });

      pageContent.innerHTML = `
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold text-gray-800">👥 Müşteriler</h2>
          <button onclick="showAddClient()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium"><i class="fas fa-plus mr-2"></i>Yeni Müşteri Ekle</button>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ad Soyad</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Telefon</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tür</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Kaynak</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Sorumlu</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">İşlem</th></tr>
            </thead>
            <tbody>${rows || '<tr><td colspan="6" class="text-center py-6 text-gray-400">Henüz müşteri eklenmemiş.</td></tr>'}</tbody>
          </table>
        </div>
      `;
    }

    window.showAddClient = function() {
      const agentOptions = agentsList.map(a => `<option value="${a.id}">${a.full_name}</option>`).join('');
      openModal(`
        <h3 class="text-xl font-bold mb-4">Yeni Müşteri Ekle</h3>
        <form id="clientForm" class="grid grid-cols-2 gap-4">
          <input type="text" name="first_name" placeholder="Ad *" required class="border p-2 rounded"/>
          <input type="text" name="last_name" placeholder="Soyad *" required class="border p-2 rounded"/>
          <input type="text" name="tc_kimlik" placeholder="TC Kimlik" class="border p-2 rounded"/>
          <select name="citizenship" class="border p-2 rounded"><option value="TC">TC</option><option value="Yabanci">Yabancı</option></select>
          <input type="text" name="phone" placeholder="Telefon *" required class="border p-2 rounded"/>
          <input type="email" name="email" placeholder="Email" class="border p-2 rounded"/>
          <input type="text" name="preferred_contact_time" placeholder="Uygun Görüşme Zamanı" class="border p-2 rounded"/>
          <select name="lead_source" class="border p-2 rounded"><option value="">Kaynak</option><option>Sahibinden</option><option>Emlakjet</option><option>Hepsiemlak</option><option>Zingat</option><option>Referans</option><option>Sosyal Medya</option><option>Vitrin</option></select>
          <select name="client_type" class="border p-2 rounded"><option value="alici">Alıcı</option><option value="kiraci">Kiracı</option><option value="satici">Satıcı</option><option value="evsahibi">Ev Sahibi</option></select>
          <input type="number" name="budget_min" placeholder="Min Bütçe" class="border p-2 rounded"/>
          <input type="number" name="budget_max" placeholder="Max Bütçe" class="border p-2 rounded"/>
          <select name="currency" class="border p-2 rounded"><option value="TRY">TRY</option><option value="USD">USD</option><option value="EUR">EUR</option></select>
          <input type="text" name="preferred_districts" placeholder="Tercih İlçeler (virgülle ayır)" class="col-span-2 border p-2 rounded"/>
          <textarea name="required_specs" placeholder="Özel İstekler" class="col-span-2 border p-2 rounded" rows="2"></textarea>
          <select name="assigned_agent_id" class="col-span-2 border p-2 rounded"><option value="">Sorumlu Agent</option>${agentOptions}</select>
          <div class="col-span-2 flex justify-end space-x-3 mt-4">
            <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded">İptal</button>
            <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded">Kaydet</button>
          </div>
        </form>
      `);
      document.getElementById('clientForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = new FormData(e.target);
        const payload = Object.fromEntries(data.entries());
        payload.created_by = currentUser.id;
        if (payload.preferred_districts) payload.preferred_districts = payload.preferred_districts.split(',').map(s => s.trim());
        else payload.preferred_districts = [];
        const { error } = await supabase.from('clients').insert([payload]);
        if (error) { alert('Hata: ' + error.message); return; }
        closeModal();
        renderClients();
      });
    };

    window.editClient = async function(id) {
      const { data: c } = await supabase.from('clients').select('*').eq('id', id).single();
      if (!c) return;
      // Quick edit with simple fields to avoid bloating, but implement similarly if needed.
      // For brevity, I'll prompt to use the add form logic but in production you'd fill it.
      alert('Düzenleme için lütfen kod içindeki editClient fonksiyonunu genişletin (detaylı form). Alternatif olarak doğrudan Supabase dashboard\'dan düzenleyin.');
    };
    window.deleteClient = async function(id) {
      if (!confirm('Müşteriyi sil?')) return;
      await supabase.from('clients').delete().eq('id', id);
      renderClients();
    };

    // ============================================================
    // 11. TASKS (Kanban style)
    // ============================================================
    async function renderTasks() {
      const { data: tasks } = await supabase
        .from('tasks')
        .select('*, assigned_to(id, full_name), property_id(id, title), client_id(id, first_name, last_name)')
        .order('due_date', { ascending: true });

      let cards = '';
      tasks?.forEach(t => {
        const clientName = t.client_id ? `${t.client_id.first_name} ${t.client_id.last_name}` : '-';
        const propTitle = t.property_id ? t.property_id.title : '-';
        cards += `
          <div class="bg-white p-4 rounded-lg shadow border-l-4 ${t.priority === 'high' ? 'border-red-500' : t.priority === 'medium' ? 'border-orange-400' : 'border-blue-400'}">
            <div class="flex justify-between items-start">
              <h4 class="font-semibold">${t.title}</h4>
              <span class="text-xs px-2 py-1 rounded-full ${statusBadge(t.status)}">${t.status}</span>
            </div>
            <p class="text-sm text-gray-600 mt-1">${t.description || ''}</p>
            <div class="flex flex-wrap gap-2 mt-2 text-xs text-gray-500">
              <span><i class="far fa-user"></i> ${getAgentName(t.assigned_to)}</span>
              <span><i class="far fa-calendar-alt"></i> ${formatDate(t.due_date)}</span>
              <span><i class="fas fa-home"></i> ${propTitle}</span>
              <span><i class="fas fa-user-tie"></i> ${clientName}</span>
            </div>
            <div class="mt-3 flex space-x-2">
              <button onclick="editTask('${t.id}')" class="text-indigo-600 hover:text-indigo-800 text-sm"><i class="fas fa-edit"></i></button>
              <button onclick="deleteTask('${t.id}')" class="text-red-600 hover:text-red-800 text-sm"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        `;
      });

      pageContent.innerHTML = `
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold text-gray-800">✅ Görevler</h2>
          <button onclick="showAddTask()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium"><i class="fas fa-plus mr-2"></i>Yeni Görev</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          ${cards || '<div class="col-span-3 text-center text-gray-400 py-10">Henüz görev yok.</div>'}
        </div>
      `;
    }

    window.showAddTask = function() {
      const agentOptions = agentsList.map(a => `<option value="${a.id}">${a.full_name}</option>`).join('');
      openModal(`
        <h3 class="text-xl font-bold mb-4">Yeni Görev</h3>
        <form id="taskForm" class="space-y-4">
          <input type="text" name="title" placeholder="Görev Başlığı *" required class="w-full border p-2 rounded"/>
          <textarea name="description" placeholder="Açıklama" class="w-full border p-2 rounded" rows="2"></textarea>
          <select name="assigned_to" class="w-full border p-2 rounded"><option value="">Atanacak Agent</option>${agentOptions}</select>
          <input type="datetime-local" name="due_date" class="w-full border p-2 rounded"/>
          <select name="priority" class="w-full border p-2 rounded"><option value="medium">Orta</option><option value="high">Yüksek</option><option value="low">Düşük</option></select>
          <select name="status" class="w-full border p-2 rounded"><option value="pending">Bekliyor</option><option value="completed">Tamamlandı</option><option value="cancelled">İptal</option></select>
          <div class="flex justify-end space-x-3">
            <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded">İptal</button>
            <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded">Kaydet</button>
          </div>
        </form>
      `);
      document.getElementById('taskForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = new FormData(e.target);
        const payload = Object.fromEntries(data.entries());
        payload.created_by = currentUser.id;
        const { error } = await supabase.from('tasks').insert([payload]);
        if (error) { alert('Hata: ' + error.message); return; }
        closeModal();
        renderTasks();
      });
    };
    window.deleteTask = async function(id) {
      if (!confirm('Görevi sil?')) return;
      await supabase.from('tasks').delete().eq('id', id);
      renderTasks();
    };
    window.editTask = async function(id) {
      alert('Düzenleme fonksiyonu property ve client ile benzer şekilde eklenebilir. Şimdilik görevi silebilir veya yeniden oluşturabilirsiniz.');
    };

    // ============================================================
    // 12. TEAM
    // ============================================================
    async function renderTeam() {
      const { data: profiles } = await supabase.from('profiles').select('*');
      let cards = '';
      profiles?.forEach(p => {
        cards += `
          <div class="bg-white p-6 rounded-xl shadow-sm flex items-center space-x-4">
            <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold text-xl">${p.full_name?.charAt(0) || 'A'}</div>
            <div>
              <p class="font-semibold">${p.full_name || 'İsimsiz'}</p>
              <p class="text-sm text-gray-500">${p.role || 'agent'} ${p.id === currentUser.id ? '(Sen)' : ''}</p>
            </div>
          </div>
        `;
      });
      pageContent.innerHTML = `
        <h2 class="text-2xl font-bold text-gray-800 mb-6">👨‍💼 Ekip Üyeleri (${profiles?.length || 0})</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          ${cards}
        </div>
      `;
    }

    // ============================================================
    // 13. START
    // ============================================================
    initSession();
  </script>
</body>
</html>

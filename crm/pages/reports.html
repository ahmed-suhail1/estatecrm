<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raporlar — Emlak CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/layout.css">
<style>
  .report-table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
  .report-table th {
    text-align: left; padding: var(--space-3);
    color: var(--color-ink-soft); font-size: var(--text-xs);
    text-transform: uppercase; letter-spacing: 0.04em;
    border-bottom: 1px solid var(--color-line);
  }
  .report-table td { padding: var(--space-3); border-bottom: 1px solid var(--color-line-soft); }
  .report-name { font-weight: 700; }
  .bar-track { background: var(--color-bg-soft); border-radius: 100px; height: 8px; overflow: hidden; width: 100%; }
  .bar-fill { background: var(--color-brass); height: 100%; border-radius: 100px; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: var(--space-4); margin-bottom: var(--space-5); }
  .kpi-card { padding: var(--space-4); }
  .kpi-value { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: 600; }
  .kpi-label { font-size: var(--text-sm); color: var(--color-ink-soft); }
</style>
</head>
<body>

<div class="app-shell" id="shellRoot"></div>

<template id="pageTemplate">
  <div class="page">
    <div class="page-header">
      <div>
        <h1>Raporlar</h1>
        <p class="subtitle">Ekip performansı ve pipeline özeti.</p>
      </div>
    </div>

    <div class="kpi-row" id="kpiRow">
      <div class="spinner"></div>
    </div>

    <div class="card" style="padding: var(--space-4); overflow-x:auto;">
      <h3 style="margin-bottom: var(--space-4);">Danışman Bazlı Performans</h3>
      <table class="report-table" id="agentTable">
        <thead>
          <tr>
            <th>Danışman</th>
            <th>Toplam Müşteri</th>
            <th>Kapanan</th>
            <th>Dönüşüm</th>
            <th>Aktif İlan</th>
          </tr>
        </thead>
        <tbody id="agentTableBody">
          <tr><td colspan="5"><div class="spinner" style="margin:16px auto;"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</template>

<script type="module" src="../js/reports.js"></script>
</body>
</html>

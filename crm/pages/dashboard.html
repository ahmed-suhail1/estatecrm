<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel — Emlak CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/layout.css">
<style>
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: var(--space-4);
    margin-bottom: var(--space-6);
  }
  .stat-card {
    padding: var(--space-4) var(--space-5);
  }
  .stat-value {
    font-family: var(--font-display);
    font-size: var(--text-3xl);
    font-weight: 600;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label { color: var(--color-ink-soft); font-size: var(--text-sm); }

  .dash-grid {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: var(--space-5);
  }
  @media (max-width: 960px) {
    .dash-grid { grid-template-columns: 1fr; }
  }

  .section-card { padding: var(--space-5); }
  .section-title {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: var(--space-4);
  }
  .section-title h3 { margin: 0; }

  .task-row {
    display: flex; align-items: center; gap: var(--space-3);
    padding: var(--space-3) 0;
    border-bottom: 1px solid var(--color-line-soft);
  }
  .task-row:last-child { border-bottom: none; }
  .task-name { font-weight: 600; font-size: var(--text-sm); }
  .task-meta { font-size: var(--text-xs); color: var(--color-ink-soft); }
  .task-due { margin-left: auto; font-size: var(--text-xs); font-weight: 700; white-space: nowrap; }
  .due-today { color: var(--status-lost); }
  .due-soon { color: var(--status-viewing); }

  .feed-item {
    display: flex; gap: var(--space-3);
    padding: var(--space-3) 0;
    border-bottom: 1px solid var(--color-line-soft);
  }
  .feed-item:last-child { border-bottom: none; }
  .feed-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--color-brass-soft); color: var(--color-brass-dark);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; flex-shrink: 0;
  }
  .feed-text { font-size: var(--text-sm); }
  .feed-text b { font-weight: 700; }
  .feed-time { font-size: var(--text-xs); color: var(--color-ink-soft); margin-top: 2px; }
</style>
</head>
<body>

<div class="app-shell" id="shellRoot"></div>

<template id="pageTemplate">
  <div class="page">
    <div class="page-header">
      <div>
        <h1 id="greeting">Hoş geldiniz</h1>
        <p class="subtitle">İşte bugünün özeti.</p>
      </div>
      <div class="page-actions">
        <a href="leads.html?new=1" class="btn btn-primary">+ Yeni Müşteri</a>
        <a href="properties.html?new=1" class="btn btn-brass">+ Yeni İlan</a>
      </div>
    </div>

    <div class="stat-grid">
      <div class="card stat-card">
        <div class="stat-value" id="statUnclaimed">–</div>
        <div class="stat-label">Sahipsiz müşteri</div>
      </div>
      <div class="card stat-card">
        <div class="stat-value" id="statMyLeads">–</div>
        <div class="stat-label">Bana atanmış müşteri</div>
      </div>
      <div class="card stat-card">
        <div class="stat-value" id="statViewingsToday">–</div>
        <div class="stat-label">Bugünkü randevu</div>
      </div>
      <div class="card stat-card">
        <div class="stat-value" id="statActiveListings">–</div>
        <div class="stat-label">Aktif ilan</div>
      </div>
    </div>

    <div class="dash-grid">
      <div class="card section-card">
        <div class="section-title">
          <h3>Bugün yapılacaklar</h3>
          <a href="leads.html" class="btn btn-ghost btn-sm">Tümünü gör</a>
        </div>
        <div id="tasksList">
          <div class="spinner"></div>
        </div>
      </div>

      <div class="card section-card">
        <div class="section-title">
          <h3>Ekip Akışı</h3>
        </div>
        <div id="feedList">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>
</template>

<script type="module" src="../js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Satışlar — Emlak CRM</title>

<!-- Ana ekrana ekleme desteği (iOS ve Android) -->
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#1C2B33">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Emlak CRM">
<link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
<link rel="icon" href="../icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/leads.css">
<link rel="stylesheet" href="../css/sales.css">
</head>
<body>

<div class="app-shell" id="shellRoot"></div>

<template id="pageTemplate">
  <div class="page">
    <div class="page-header">
      <div>
        <h1>Satışlar</h1>
        <p class="subtitle" id="pageSubtitle">Kapanan satışlarınızı buradan kaydedin.</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" id="addSaleBtn">+ Yeni Satış</button>
      </div>
    </div>

    <!-- Yalnızca yönetici: özet ve filtre -->
    <div id="adminSection" style="display:none;">
      <div class="sales-kpi-row" id="salesKpiRow"></div>
      <div class="filter-bar card">
        <select class="select" id="agentFilter">
          <option value="">Tüm danışmanlar</option>
        </select>
        <input class="input" type="date" id="dateFromFilter" title="Başlangıç tarihi">
        <input class="input" type="date" id="dateToFilter" title="Bitiş tarihi">
      </div>
    </div>

    <!-- Masaüstü: tablo -->
    <div class="card desktop-only" style="overflow-x:auto;">
      <table class="sales-table" id="salesTable">
        <thead id="salesTableHead"></thead>
        <tbody id="salesTableBody">
          <tr><td><div class="spinner" style="margin:20px auto;"></div></td></tr>
        </tbody>
      </table>
    </div>

    <!-- Mobil: kartlar -->
    <div class="mobile-only" id="salesCardList">
      <div class="spinner" style="margin:20px auto;"></div>
    </div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <h3>Henüz satış kaydı yok</h3>
      <p>İlk satışınızı "+ Yeni Satış" ile ekleyin.</p>
    </div>
  </div>
</template>

<!-- Satış ekle/düzenle modalı -->
<div class="modal-overlay" id="saleModalOverlay">
  <div class="modal card modal-lg" id="saleModal">
    <div class="modal-header">
      <h3 id="saleModalTitle">Yeni Satış</h3>
      <button class="btn btn-ghost btn-icon" id="closeSaleModal" aria-label="Kapat">✕</button>
    </div>
    <form id="saleForm">
      <input type="hidden" id="saleId">

      <div class="form-section-label">Satış Bilgileri</div>
      <div class="field-row">
        <div class="field">
          <label for="saleDate">Satış Tarihi *</label>
          <input class="input" type="date" id="saleDate" required>
        </div>
        <div class="field">
          <label for="saleCustomerName">Müşteri Adı Soyadı *</label>
          <input class="input" id="saleCustomerName" required>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="saleProjectName">Proje/Site Adı</label>
          <input class="input" id="saleProjectName">
        </div>
        <div class="field">
          <label for="saleUnitInfo">Daire Bilgileri</label>
          <input class="input" id="saleUnitInfo" placeholder="3+1, 5. kat">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="saleFxBringer">Dövizli Getiren</label>
          <input class="input" id="saleFxBringer">
        </div>
        <div class="field">
          <label for="saleFxSeller">Dövizli Satan</label>
          <input class="input" id="saleFxSeller">
        </div>
      </div>
      <div class="field">
        <label for="saleIntermediary">Aracı</label>
        <input class="input" id="saleIntermediary">
      </div>

      <div class="form-section-label">Tutar ve Komisyon</div>
      <div class="field">
        <label>Para Birimi</label>
        <div class="currency-toggle">
          <label><input type="radio" name="currency" value="TL" id="currencyTL" checked><span>₺ TL</span></label>
          <label><input type="radio" name="currency" value="USD" id="currencyUSD"><span>$ USD</span></label>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="saleAmount">Satış Tutarı *</label>
          <input class="input" type="number" id="saleAmount" min="0" step="0.01" required>
        </div>
        <div class="field" id="exchangeRateField" style="display:none;">
          <label for="exchangeRate">Kur (USD ise)</label>
          <input class="input" type="number" id="exchangeRate" min="0" step="0.0001">
        </div>
      </div>
      <div class="field">
        <label for="tlEquivalent">TL Karşılığı</label>
        <input class="input" type="number" id="tlEquivalent" min="0" step="0.01">
      </div>
      <div class="field-row">
        <div class="field">
          <label for="commissionRate">Komisyon Oranı (%)</label>
          <input class="input" type="number" id="commissionRate" min="0" step="0.01">
        </div>
        <div class="field">
          <label for="commissionAmount">Komisyon Tutarı</label>
          <input class="input" type="number" id="commissionAmount" min="0" step="0.01">
        </div>
      </div>
      <div class="field">
        <label for="saleDeposit">Kapora</label>
        <input class="input" type="number" id="saleDeposit" min="0" step="0.01">
      </div>

      <div class="form-section-label">Durum</div>
      <div class="field-row">
        <div class="field">
          <label for="paymentStatus">Ödeme Durumu</label>
          <select class="select" id="paymentStatus">
            <option value="bekliyor">Bekliyor</option>
            <option value="kismi">Kısmi Ödendi</option>
            <option value="tamamlandi">Tamamlandı</option>
          </select>
        </div>
        <div class="field">
          <label for="deedDate">Tapu Tarihi</label>
          <input class="input" type="date" id="deedDate">
        </div>
      </div>
      <div class="field">
        <label for="citizenshipEligibility">Vatandaşlık Uygunluğu</label>
        <select class="select" id="citizenshipEligibility">
          <option value="belirsiz">Belirsiz</option>
          <option value="evet">Evet</option>
          <option value="hayir">Hayır</option>
        </select>
      </div>
      <div class="field">
        <label for="saleNotes">Notlar</label>
        <textarea class="textarea" id="saleNotes" rows="2"></textarea>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="deleteSaleBtn" style="margin-right:auto; display:none; color:var(--status-lost);">Sil</button>
        <button type="button" class="btn btn-ghost" id="cancelSaleBtn">Vazgeç</button>
        <button type="submit" class="btn btn-primary" id="saveSaleBtn">Kaydet</button>
      </div>
    </form>
  </div>
</div>

<div id="toastRoot"></div>

<script type="module" src="../js/sales.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("../sw.js").catch(() => {});
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>İlanlar — Emlak CRM</title>

<!-- Ana ekrana ekleme desteği (iOS ve Android) -->
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#1C2B33">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Emlak CRM">
<link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
<link rel="icon" href="../icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/leads.css">
<link rel="stylesheet" href="../css/properties.css">
</head>
<body>

<div class="app-shell" id="shellRoot"></div>

<template id="pageTemplate">
  <div class="page">
    <div class="page-header">
      <div>
        <h1>İlanlar</h1>
        <p class="subtitle">Ekibin ortak ilan havuzu.</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" id="addPropertyBtn">+ Yeni İlan</button>
      </div>
    </div>

    <div class="filter-bar card">
      <input class="input" id="searchInput" placeholder="Başlık, bölge ara...">
      <select class="select" id="typeFilter">
        <option value="">Satış / Kiralama</option>
        <option value="sale">Satılık</option>
        <option value="rent">Kiralık</option>
      </select>
      <select class="select" id="statusFilter">
        <option value="">Tüm durumlar</option>
        <option value="available">Aktif</option>
        <option value="reserved">Rezerve</option>
        <option value="sold">Satıldı</option>
        <option value="rented">Kiralandı</option>
      </select>
    </div>

    <div class="property-grid" id="propertyGrid">
      <div class="spinner" style="margin:20px auto;"></div>
    </div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <h3>İlan bulunamadı</h3>
      <p>Filtreleri değiştirin veya yeni bir ilan ekleyin.</p>
    </div>
  </div>
</template>

<div class="modal-overlay" id="propertyModalOverlay">
  <div class="modal card modal-lg" id="propertyModal">
    <div class="modal-header">
      <h3 id="propertyModalTitle">Yeni İlan</h3>
      <button class="btn btn-ghost btn-icon" id="closePropertyModal" aria-label="Kapat">✕</button>
    </div>
    <form id="propertyForm">
      <input type="hidden" id="propertyId">
      <div class="field">
        <label for="propertyTitle">İlan Başlığı *</label>
        <input class="input" id="propertyTitle" required placeholder="Kadıköy'de deniz manzaralı 3+1">
      </div>
      <div class="field-row">
        <div class="field">
          <label for="propertyType">Tür</label>
          <select class="select" id="propertyType">
            <option value="sale">Satılık</option>
            <option value="rent">Kiralık</option>
          </select>
        </div>
        <div class="field">
          <label for="propertyPrice">Fiyat (₺) *</label>
          <input class="input" type="number" id="propertyPrice" required min="0">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="propertyCity">Şehir</label>
          <input class="input" id="propertyCity" placeholder="İstanbul">
        </div>
        <div class="field">
          <label for="propertyArea">Semt / Bölge</label>
          <input class="input" id="propertyArea" placeholder="Kadıköy">
        </div>
      </div>
      <div class="field">
        <label for="propertyAddress">Adres</label>
        <input class="input" id="propertyAddress">
      </div>
      <div class="field-row">
        <div class="field">
          <label for="propertyBedrooms">Oda Sayısı</label>
          <input class="input" id="propertyBedrooms" placeholder="3+1">
        </div>
        <div class="field">
          <label for="propertySize">Metrekare (m²)</label>
          <input class="input" type="number" id="propertySize" min="0">
        </div>
      </div>
      <div class="field">
        <label for="propertyDescription">Açıklama</label>
        <textarea class="textarea" id="propertyDescription" rows="3"></textarea>
      </div>
      <div class="field">
        <label for="propertyOwnerContact">Mülk Sahibi İletişim</label>
        <input class="input" id="propertyOwnerContact" placeholder="İsim ve telefon">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="cancelPropertyBtn">Vazgeç</button>
        <button type="submit" class="btn btn-primary" id="savePropertyBtn">Kaydet</button>
      </div>
    </form>
  </div>
</div>

<div id="toastRoot"></div>

<script type="module" src="../js/properties.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("../sw.js").catch(() => {});
  }
</script>
</body>
</html>

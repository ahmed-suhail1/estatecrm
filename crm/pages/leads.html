<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Müşteriler — Emlak CRM</title>

<!-- Ana ekrana ekleme desteği (iOS ve Android) -->
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#1C2B33">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Emlak CRM">
<link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
<link rel="icon" href="../icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/leads.css">
</head>
<body>

<div class="app-shell" id="shellRoot"></div>

<template id="pageTemplate">
  <div class="page">
    <div class="page-header">
      <div>
        <h1>Müşteriler</h1>
        <p class="subtitle">Tüm ekibin paylaştığı müşteri havuzu.</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" id="addLeadBtn">+ Yeni Müşteri</button>
      </div>
    </div>

    <!-- Filtreler -->
    <div class="filter-bar card">
      <input class="input" id="searchInput" placeholder="İsim veya telefon ara...">
      <select class="select" id="statusFilter">
        <option value="">Tüm durumlar</option>
        <option value="new">Yeni</option>
        <option value="contacted">İletişime geçildi</option>
        <option value="viewing">Görüşme/Gezi</option>
        <option value="negotiating">Pazarlık</option>
        <option value="closed">Kapandı</option>
        <option value="lost">Kaybedildi</option>
      </select>
      <select class="select" id="ownerFilter">
        <option value="">Tüm danışmanlar</option>
        <option value="unclaimed">Sahipsiz</option>
        <option value="mine">Bana atanmış</option>
      </select>
    </div>

    <!-- Masaüstü: tablo -->
    <div class="card desktop-only" style="overflow-x:auto;">
      <table class="leads-table" id="leadsTable">
        <thead>
          <tr>
            <th>Müşteri</th>
            <th>Telefon</th>
            <th>İlgi</th>
            <th>Bütçe</th>
            <th>Durum</th>
            <th>Danışman</th>
            <th>Sonraki Adım</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="leadsTableBody">
          <tr><td colspan="8"><div class="spinner" style="margin:20px auto;"></div></td></tr>
        </tbody>
      </table>
    </div>

    <!-- Mobil: kartlar -->
    <div class="mobile-only" id="leadsCardList">
      <div class="spinner" style="margin:20px auto;"></div>
    </div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <h3>Müşteri bulunamadı</h3>
      <p>Filtreleri değiştirin veya yeni bir müşteri ekleyin.</p>
    </div>
  </div>
</template>

<!-- Müşteri ekle/düzenle modalı -->
<div class="modal-overlay" id="leadModalOverlay">
  <div class="modal card" id="leadModal">
    <div class="modal-header">
      <h3 id="leadModalTitle">Yeni Müşteri</h3>
      <button class="btn btn-ghost btn-icon" id="closeLeadModal" aria-label="Kapat">✕</button>
    </div>
    <form id="leadForm">
      <input type="hidden" id="leadId">
      <div class="field">
        <label for="leadName">Ad Soyad *</label>
        <input class="input" id="leadName" required>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="leadPhone">Telefon *</label>
          <input class="input" id="leadPhone" required placeholder="05XX XXX XX XX">
        </div>
        <div class="field">
          <label for="leadEmail">E-posta</label>
          <input class="input" type="email" id="leadEmail">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="leadInterest">İlgi Türü</label>
          <select class="select" id="leadInterest">
            <option value="buy">Satın alma</option>
            <option value="rent">Kiralama</option>
            <option value="sell">Satış (mülk sahibi)</option>
          </select>
        </div>
        <div class="field">
          <label for="leadSource">Kaynak</label>
          <select class="select" id="leadSource">
            <option value="walkin">Ofise gelen</option>
            <option value="referral">Referans</option>
            <option value="portal">İlan sitesi</option>
            <option value="social">Sosyal medya</option>
            <option value="other">Diğer</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="leadBudgetMin">Min. Bütçe (₺)</label>
          <input class="input" type="number" id="leadBudgetMin" min="0">
        </div>
        <div class="field">
          <label for="leadBudgetMax">Max. Bütçe (₺)</label>
          <input class="input" type="number" id="leadBudgetMax" min="0">
        </div>
      </div>
      <div class="field">
        <label for="leadAreas">Tercih Edilen Bölgeler</label>
        <input class="input" id="leadAreas" placeholder="Kadıköy, Üsküdar, Beşiktaş...">
      </div>
      <div class="field">
        <label for="leadNote">Not</label>
        <textarea class="textarea" id="leadNote" rows="2"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="cancelLeadBtn">Vazgeç</button>
        <button type="submit" class="btn btn-primary" id="saveLeadBtn">Kaydet</button>
      </div>
    </form>
  </div>
</div>

<!-- Müşteri detay modalı (görüşme geçmişi + hızlı not) -->
<div class="modal-overlay" id="detailModalOverlay">
  <div class="modal card modal-lg" id="detailModal">
    <div class="modal-header">
      <div>
        <h3 id="detailName">—</h3>
        <span class="pill" id="detailStatusPill"></span>
      </div>
      <button class="btn btn-ghost btn-icon" id="closeDetailModal" aria-label="Kapat">✕</button>
    </div>

    <div class="detail-meta">
      <div><span class="detail-label">Telefon</span><div id="detailPhone">—</div></div>
      <div><span class="detail-label">Bütçe</span><div id="detailBudget">—</div></div>
      <div><span class="detail-label">Bölgeler</span><div id="detailAreas">—</div></div>
      <div><span class="detail-label">Danışman</span><div id="detailAgent">—</div></div>
    </div>

    <div class="detail-actions">
      <button class="btn btn-brass btn-sm" id="claimBtn">Bu müşteriyi üstlen</button>
      <select class="select btn-sm" id="reassignSelect" style="display:none; max-width:180px;"></select>
      <select class="select btn-sm" id="statusSelect" style="max-width:180px;"></select>
      <button class="btn btn-ghost btn-sm" id="editLeadBtn">Düzenle</button>
      <button class="btn btn-ghost btn-sm" id="matchBtn">🏠 Uygun İlan Bul</button>
    </div>

    <div id="matchResults" class="match-results" style="display:none;"></div>
    <p id="detailPermissionNote" class="unclaimed-text" style="display:none;">Bu müşteri başka bir danışmana atandığı için yalnızca görüntüleyebilir ve görüşme kaydı ekleyebilirsiniz.</p>

    <h4 style="margin-top:var(--space-5);">Görüşme Geçmişi</h4>
    <form id="interactionForm" class="interaction-form">
      <select class="select" id="interactionType" style="max-width:140px;">
        <option value="call">📞 Telefon</option>
        <option value="whatsapp">💬 WhatsApp</option>
        <option value="email">✉️ E-posta</option>
        <option value="viewing">🏠 Gezi</option>
        <option value="meeting">🤝 Görüşme</option>
      </select>
      <input class="input" id="interactionNote" placeholder="Görüşme notu / sonuç..." required>
      <input class="input" type="date" id="interactionNextDate" title="Sonraki takip tarihi" style="max-width:150px;">
      <button type="submit" class="btn btn-primary btn-sm">Ekle</button>
    </form>

    <div id="interactionsList" class="interactions-list"></div>
  </div>
</div>

<div id="toastRoot"></div>

<script type="module" src="../js/leads.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("../sw.js").catch(() => {});
  }
</script>
</body>
</html>

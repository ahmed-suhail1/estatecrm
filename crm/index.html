<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Emlak CRM — Giriş</title>

<!-- Ana ekrana ekleme desteği (iOS ve Android) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1C2B33">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Emlak CRM">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<style>
  body {
    background: var(--color-bg-soft);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-4);
  }
  .login-wrap {
    width: 100%;
    max-width: 380px;
  }
  .login-brand {
    text-align: center;
    margin-bottom: var(--space-6);
  }
  .login-brand .brand-mark {
    width: 52px; height: 52px;
    border-radius: var(--radius-md);
    background: var(--color-ink);
    color: var(--color-brass-soft);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    margin-bottom: var(--space-3);
  }
  .login-brand h1 { font-size: var(--text-2xl); margin-bottom: 2px; }
  .login-brand p { color: var(--color-ink-soft); font-size: var(--text-sm); }

  .login-card {
    padding: var(--space-6);
  }
  .login-card .btn-primary { width: 100%; margin-top: var(--space-2); }
  .login-error {
    background: var(--status-lost-bg);
    color: var(--status-lost);
    border-radius: var(--radius-sm);
    padding: var(--space-3);
    font-size: var(--text-sm);
    margin-bottom: var(--space-4);
    display: none;
  }
  .login-error.show { display: block; }
  .login-pending {
    background: var(--status-viewing-bg);
    color: var(--status-viewing);
    border-radius: var(--radius-sm);
    padding: var(--space-3);
    font-size: var(--text-sm);
    margin-bottom: var(--space-4);
    display: none;
  }
  .login-pending.show { display: block; }
  .toggle-row {
    text-align: center;
    margin-top: var(--space-5);
    font-size: var(--text-sm);
    color: var(--color-ink-soft);
  }
  .toggle-row a { font-weight: 600; }
  .footnote {
    text-align: center;
    margin-top: var(--space-5);
    font-size: var(--text-xs);
    color: var(--color-ink-soft);
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-brand">
    <div class="brand-mark">E</div>
    <h1>Emlak CRM</h1>
    <p>Ekibinizin ortak müşteri ve ilan paneli</p>
  </div>

  <div class="card login-card">
    <div id="loginError" class="login-error"></div>
    <div id="pendingNotice" class="login-pending">
      Hesabınız oluşturuldu. Yönetici onayı bekleniyor — onaylandığında giriş yapabilirsiniz.
    </div>

    <form id="loginForm">
      <div class="field">
        <label for="email">E-posta</label>
        <input class="input" type="email" id="email" required autocomplete="username" placeholder="ornek@ofis.com">
      </div>
      <div class="field">
        <label for="password">Şifre</label>
        <input class="input" type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">Giriş Yap</button>
    </form>

    <form id="registerForm" style="display:none;">
      <div class="field">
        <label for="regName">Ad Soyad</label>
        <input class="input" type="text" id="regName" required placeholder="Ayşe Yılmaz">
      </div>
      <div class="field">
        <label for="regEmail">E-posta</label>
        <input class="input" type="email" id="regEmail" required autocomplete="username" placeholder="ornek@ofis.com">
      </div>
      <div class="field">
        <label for="regPassword">Şifre</label>
        <input class="input" type="password" id="regPassword" required autocomplete="new-password" minlength="6" placeholder="En az 6 karakter">
      </div>
      <button type="submit" class="btn btn-primary" id="registerBtn">Hesap Oluştur</button>
    </form>

    <div class="toggle-row">
      <span id="toggleToRegister">Hesabınız yok mu? <a href="#" id="showRegister">Kayıt olun</a></span>
      <span id="toggleToLogin" style="display:none;">Zaten hesabınız var mı? <a href="#" id="showLogin">Giriş yapın</a></span>
    </div>
  </div>

  <p class="footnote">Yeni hesaplar yönetici onayından sonra aktif olur.</p>
</div>

<script type="module" src="js/auth.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
</body>
</html>

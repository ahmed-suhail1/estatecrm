<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Emlak CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0F1923;
    --navy-light: #1A2B3C;
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --white: #F7F5F0;
    --slate: #2C3E50;
    --muted: #7F8C8D;
    --green: #27AE60;
    --red: #E74C3C;
    --orange: #E67E22;
    --blue: #2980B9;
    --border: #2A3F54;
    --card: #162030;
    --input-bg: #1E2F40;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--navy); color: var(--white); font-family: var(--font); font-size: 14px; display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  #sidebar {
    width: 220px; min-width: 220px; background: var(--navy-light);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    padding: 0; position: relative;
  }
  #sidebar-logo {
    padding: 20px 18px 16px;
    border-bottom: 2px solid var(--gold);
  }
  #sidebar-logo h1 { font-size: 15px; font-weight: 700; color: var(--gold); letter-spacing: 0.5px; }
  #sidebar-logo p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  #sidebar nav { flex: 1; padding: 10px 0; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 18px; cursor: pointer; color: #8FA3B1;
    font-size: 13px; font-weight: 500; border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .nav-item:hover { background: rgba(201,168,76,0.08); color: var(--white); }
  .nav-item.active { background: rgba(201,168,76,0.12); color: var(--gold); border-left-color: var(--gold); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  #sidebar-footer { padding: 14px 18px; border-top: 1px solid var(--border); }
  #agent-select { width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--white); padding: 7px 10px; border-radius: 6px; font-size: 12px; }

  /* MAIN */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar {
    background: var(--navy-light); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 54px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  #topbar h2 { font-size: 16px; font-weight: 600; }
  #topbar-actions { display: flex; gap: 10px; align-items: center; }
  #search-bar { background: var(--input-bg); border: 1px solid var(--border); color: var(--white); padding: 7px 14px; border-radius: 6px; font-size: 13px; width: 240px; }
  #search-bar::placeholder { color: var(--muted); }
  .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--white); }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  #content { flex: 1; overflow-y: auto; padding: 24px; }

  /* DASHBOARD CARDS */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-top: 3px solid var(--gold);
    border-radius: 8px; padding: 18px 20px;
  }
  .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: var(--white); margin: 6px 0 2px; }
  .stat-card .sub { font-size: 12px; color: var(--muted); }

  /* TABLES */
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: rgba(201,168,76,0.08); }
  th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; }
  td { padding: 11px 14px; border-top: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .td-actions { display: flex; gap: 6px; }

  /* BADGES */
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(39,174,96,0.2); color: #4dd986; }
  .badge-orange { background: rgba(230,126,34,0.2); color: #f39c12; }
  .badge-red { background: rgba(231,76,60,0.2); color: #e74c3c; }
  .badge-blue { background: rgba(41,128,185,0.2); color: #5dade2; }
  .badge-gray { background: rgba(127,140,141,0.2); color: #aab; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: #1A2B3C; border: 1px solid var(--border); border-top: 3px solid var(--gold); border-radius: 10px; padding: 28px; width: 600px; max-height: 85vh; overflow-y: auto; position: relative; }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--gold); }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
  .modal-close:hover { color: var(--white); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid .full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--input-bg); border: 1px solid var(--border); color: var(--white);
    padding: 9px 12px; border-radius: 6px; font-size: 13px; font-family: var(--font);
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--gold);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-group select option { background: var(--navy); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }

  /* SECTION HEADERS */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-header h3 { font-size: 15px; font-weight: 600; }

  /* TASKS */
  .task-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 7px;
    padding: 13px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
  }
  .task-item.done { opacity: 0.5; }
  .task-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--gold); cursor: pointer; }
  .task-info { flex: 1; }
  .task-info .task-title { font-size: 13px; font-weight: 500; }
  .task-info .task-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* LOADING */
  .loading { text-align: center; padding: 40px; color: var(--muted); }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 999; display: none; }
  #toast.error { background: var(--red); }

  /* TABS for sections */
  .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* PRICE */
  .price { font-weight: 600; color: var(--gold-light); }

  @media (max-width: 1100px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-logo">
    <h1>🏠 Emlak CRM</h1>
    <p>Ofis Yönetim Paneli</p>
  </div>
  <nav>
    <div class="nav-item active" onclick="navigate('dashboard')"><span class="icon">📊</span> Dashboard</div>
    <div class="nav-item" onclick="navigate('contacts')"><span class="icon">👥</span> Müşteriler</div>
    <div class="nav-item" onclick="navigate('listings')"><span class="icon">🏢</span> Portföy</div>
    <div class="nav-item" onclick="navigate('deals')"><span class="icon">🤝</span> İşlemler</div>
    <div class="nav-item" onclick="navigate('tasks')"><span class="icon">✅</span> Görevler</div>
  </nav>
  <div id="sidebar-footer">
    <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:6px;">Aktif Danışman</label>
    <select id="agent-select" onchange="setAgent()">
      <option value="">— Seçiniz —</option>
    </select>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <h2 id="page-title">Dashboard</h2>
    <div id="topbar-actions">
      <input type="text" id="search-bar" placeholder="Ara..." oninput="handleSearch(this.value)"/>
      <button id="primary-btn" class="btn btn-gold" onclick="openAddModal()" style="display:none">+ Ekle</button>
    </div>
  </div>
  <div id="content">
    <div class="loading">Yükleniyor...</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="modal-title">Yeni Kayıt</h3>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">İptal</button>
      <button class="btn btn-gold" onclick="saveModal()">Kaydet</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// CONFIG — paste your Supabase URL and anon key here
// ============================================================
const SUPABASE_URL = 'https://ezcjpfcwvzcbljdddwfs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6Y2pwZmN3dnpjYmxqZGRkd2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMzAwNzMsImV4cCI6MjA5OTYwNjA3M30.MNMCkhLE7WI6MNLr-Mnn-qqNWyz19eP8skX4s_6Ic7k';
// ============================================================

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentPage = 'dashboard';
let currentAgent = null;
let agents = [];
let modalMode = null; // 'add' | 'edit'
let modalType = null;
let editId = null;
let searchTimeout = null;

// ============================================================
// INIT
// ============================================================
async function init() {
  const { data } = await db.from('agents').select('*').order('name');
  agents = data || [];
  const sel = document.getElementById('agent-select');
  agents.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.id;
    opt.textContent = a.name;
    sel.appendChild(opt);
  });
  const saved = localStorage.getItem('crm_agent');
  if (saved) { sel.value = saved; currentAgent = saved; }
  navigate('dashboard');
}

function setAgent() {
  const sel = document.getElementById('agent-select');
  currentAgent = sel.value;
  localStorage.setItem('crm_agent', currentAgent);
}

// ============================================================
// NAVIGATION
// ============================================================
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navItems = document.querySelectorAll('.nav-item');
  const pages = ['dashboard','contacts','listings','deals','tasks'];
  const idx = pages.indexOf(page);
  if (idx >= 0) navItems[idx].classList.add('active');

  const titles = { dashboard:'Dashboard', contacts:'Müşteriler', listings:'Portföy', deals:'İşlemler', tasks:'Görevler' };
  document.getElementById('page-title').textContent = titles[page];
  document.getElementById('primary-btn').style.display = page !== 'dashboard' ? 'inline-block' : 'none';

  const renders = { dashboard: renderDashboard, contacts: renderContacts, listings: renderListings, deals: renderDeals, tasks: renderTasks };
  renders[page]();
}

// ============================================================
// SEARCH
// ============================================================
function handleSearch(val) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const renders = { contacts: renderContacts, listings: renderListings, deals: renderDeals, tasks: renderTasks };
    if (renders[currentPage]) renders[currentPage](val);
  }, 300);
}

// ============================================================
// DASHBOARD
// ============================================================
async function renderDashboard() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Yükleniyor...</div>';

  const [contacts, listings, deals, tasks] = await Promise.all([
    db.from('contacts').select('id', { count:'exact' }),
    db.from('listings').select('id,status', { count:'exact' }),
    db.from('deals').select('id,status,commission_amount,deal_type'),
    db.from('tasks').select('id,is_done,due_date,title,task_type,assigned_agent_id').eq('is_done', false).order('due_date')
  ]);

  const activeListings = (listings.data||[]).filter(l => l.status === 'aktif').length;
  const closedDeals = (deals.data||[]).filter(d => d.status === 'kapandi');
  const totalComm = closedDeals.reduce((s, d) => s + (d.commission_amount || 0), 0);

  content.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Toplam Müşteri</div><div class="value">${contacts.count || 0}</div><div class="sub">Kayıtlı müşteri</div></div>
      <div class="stat-card"><div class="label">Aktif Portföy</div><div class="value">${activeListings}</div><div class="sub">${(listings.count||0)} toplam ilan</div></div>
      <div class="stat-card"><div class="label">Kapanan İşlem</div><div class="value">${closedDeals.length}</div><div class="sub">${(deals.count||0)} toplam işlem</div></div>
      <div class="stat-card"><div class="label">Toplam Komisyon</div><div class="value">${formatPrice(totalComm)}</div><div class="sub">Kapanan işlemlerden</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div>
        <div class="section-header"><h3>📋 Yaklaşan Görevler</h3></div>
        <div id="dash-tasks"></div>
      </div>
      <div>
        <div class="section-header"><h3>🔥 Son Eklen Portföy</h3></div>
        <div id="dash-listings"></div>
      </div>
    </div>
  `;

  // Upcoming tasks
  const taskEl = document.getElementById('dash-tasks');
  const upcomingTasks = (tasks.data||[]).slice(0, 6);
  if (!upcomingTasks.length) {
    taskEl.innerHTML = '<div class="empty"><div class="icon">✅</div><p>Bekleyen görev yok</p></div>';
  } else {
    taskEl.innerHTML = upcomingTasks.map(t => {
      const agent = agents.find(a => a.id === t.assigned_agent_id);
      const due = t.due_date ? new Date(t.due_date).toLocaleDateString('tr-TR') : '-';
      return `<div class="task-item">
        <input type="checkbox" onchange="toggleTask('${t.id}', this)">
        <div class="task-info">
          <div class="task-title">${t.title}</div>
          <div class="task-meta">${taskTypeName(t.task_type)} · ${due}${agent ? ' · ' + agent.name : ''}</div>
        </div>
      </div>`;
    }).join('');
  }

  // Recent listings
  const { data: recentListings } = await db.from('listings').select('*').order('created_at', { ascending: false }).limit(5);
  const listEl = document.getElementById('dash-listings');
  if (!(recentListings||[]).length) {
    listEl.innerHTML = '<div class="empty"><div class="icon">🏢</div><p>Henüz portföy yok</p></div>';
  } else {
    listEl.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>İlan</th><th>Tür</th><th>Fiyat</th><th>Durum</th></tr></thead>
      <tbody>${recentListings.map(l => `<tr>
        <td>${l.title}</td>
        <td>${l.property_type}</td>
        <td class="price">${formatPrice(l.price)} ${l.currency==='TRY'?'₺':'$'}</td>
        <td>${statusBadge(l.status)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }
}

// ============================================================
// CONTACTS
// ============================================================
async function renderContacts(search='') {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Yükleniyor...</div>';

  let q = db.from('contacts').select('*, agents(name)').order('created_at', { ascending: false });
  if (search) q = q.ilike('full_name', `%${search}%`);
  const { data } = await q;

  const rows = (data||[]).map(c => {
    const agent = c.agents?.name || '-';
    const follow = c.follow_up_date ? new Date(c.follow_up_date).toLocaleDateString('tr-TR') : '-';
    return `<tr>
      <td><b>${c.full_name}</b></td>
      <td>${c.phone||'-'}</td>
      <td>${contactTypeName(c.contact_type)}</td>
      <td>${sourceName(c.source)}</td>
      <td>${c.preferred_districts||'-'}</td>
      <td>${c.budget_max ? formatPrice(c.budget_max)+' ₺' : '-'}</td>
      <td>${follow}</td>
      <td>${agent}</td>
      <td><div class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="editContact('${c.id}')">Düzenle</button>
        <button class="btn btn-danger btn-sm" onclick="deleteRecord('contacts','${c.id}')">Sil</button>
      </div></td>
    </tr>`;
  }).join('');

  content.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Ad Soyad</th><th>Telefon</th><th>Tür</th><th>Kaynak</th><th>İlçe Tercihi</th><th>Bütçe (max)</th><th>Takip Tarihi</th><th>Danışman</th><th>İşlem</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="9"><div class="empty"><p>Müşteri bulunamadı</p></div></td></tr>'}</tbody>
      </table>
    </div>`;
}

async function editContact(id) {
  const { data } = await db.from('contacts').select('*').eq('id', id).single();
  openModal('contacts', 'edit', data);
}

// ============================================================
// LISTINGS
// ============================================================
async function renderListings(search='') {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Yükleniyor...</div>';

  let q = db.from('listings').select('*, agents(name)').order('created_at', { ascending: false });
  if (search) q = q.ilike('title', `%${search}%`);
  const { data } = await q;

  const rows = (data||[]).map(l => {
    const agent = l.agents?.name || '-';
    return `<tr>
      <td><b>${l.title}</b></td>
      <td>${l.property_type}</td>
      <td>${l.deal_type === 'satilik' ? '🔵 Satılık' : '🟢 Kiralık'}</td>
      <td>${l.district||'-'}, ${l.neighborhood||'-'}</td>
      <td>${l.net_m2||'-'} m²</td>
      <td>${l.rooms||'-'}</td>
      <td class="price">${formatPrice(l.price)} ${l.currency==='TRY'?'₺':'$'}</td>
      <td>${statusBadge(l.status)}</td>
      <td>${agent}</td>
      <td><div class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="editListing('${l.id}')">Düzenle</button>
        <button class="btn btn-danger btn-sm" onclick="deleteRecord('listings','${l.id}')">Sil</button>
      </div></td>
    </tr>`;
  }).join('');

  content.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Başlık</th><th>Tür</th><th>Durum</th><th>Konum</th><th>m²</th><th>Oda</th><th>Fiyat</th><th>Statü</th><th>Danışman</th><th>İşlem</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="10"><div class="empty"><p>Portföy bulunamadı</p></div></td></tr>'}</tbody>
      </table>
    </div>`;
}

async function editListing(id) {
  const { data } = await db.from('listings').select('*').eq('id', id).single();
  openModal('listings', 'edit', data);
}

// ============================================================
// DEALS
// ============================================================
async function renderDeals(search='') {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Yükleniyor...</div>';

  const { data } = await db.from('deals').select(`
    *, 
    listings(title),
    buyer:buyer_contact_id(full_name),
    seller:seller_contact_id(full_name),
    agents(name)
  `).order('created_at', { ascending: false });

  const rows = (data||[]).map(d => {
    const buyer = d.buyer?.full_name || '-';
    const seller = d.seller?.full_name || '-';
    const listing = d.listings?.title || '-';
    const agent = d.agents?.name || '-';
    return `<tr>
      <td><b>${listing}</b></td>
      <td>${d.deal_type === 'satis' ? '🔵 Satış' : '🟢 Kiralama'}</td>
      <td>${buyer}</td>
      <td>${seller}</td>
      <td class="price">${d.final_price ? formatPrice(d.final_price)+' ₺' : '-'}</td>
      <td class="price" style="color:#4dd986">${d.commission_amount ? formatPrice(d.commission_amount)+' ₺' : '-'}</td>
      <td>${dealStatusBadge(d.status)}</td>
      <td>${d.tapu_date ? new Date(d.tapu_date).toLocaleDateString('tr-TR') : '-'}</td>
      <td>${agent}</td>
      <td><div class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="editDeal('${d.id}')">Düzenle</button>
        <button class="btn btn-danger btn-sm" onclick="deleteRecord('deals','${d.id}')">Sil</button>
      </div></td>
    </tr>`;
  }).join('');

  content.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>İlan</th><th>Tür</th><th>Alıcı</th><th>Satıcı</th><th>Satış Fiyatı</th><th>Komisyon</th><th>Durum</th><th>Tapu Tarihi</th><th>Danışman</th><th>İşlem</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="10"><div class="empty"><p>İşlem bulunamadı</p></div></td></tr>'}</tbody>
      </table>
    </div>`;
}

async function editDeal(id) {
  const { data } = await db.from('deals').select('*').eq('id', id).single();
  openModal('deals', 'edit', data);
}

// ============================================================
// TASKS
// ============================================================
async function renderTasks(search='') {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Yükleniyor...</div>';

  let q = db.from('tasks').select('*, agents(name)').order('is_done').order('due_date');
  if (search) q = q.ilike('title', `%${search}%`);
  const { data } = await q;

  const pending = (data||[]).filter(t => !t.is_done);
  const done = (data||[]).filter(t => t.is_done);

  const renderTask = (t) => {
    const agent = t.agents?.name || '-';
    const due = t.due_date ? new Date(t.due_date).toLocaleDateString('tr-TR', { day:'2-digit', month:'short', year:'numeric' }) : '-';
    const isOverdue = t.due_date && !t.is_done && new Date(t.due_date) < new Date();
    return `<div class="task-item ${t.is_done ? 'done' : ''}">
      <input type="checkbox" ${t.is_done ? 'checked' : ''} onchange="toggleTask('${t.id}', this)">
      <div class="task-info">
        <div class="task-title" style="${t.is_done ? 'text-decoration:line-through' : ''}">${t.title}</div>
        <div class="task-meta" style="${isOverdue ? 'color:#e74c3c' : ''}">
          ${taskTypeName(t.task_type)} · ${due}${isOverdue && !t.is_done ? ' ⚠️ Gecikti' : ''} · ${agent}
        </div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteRecord('tasks','${t.id}')">Sil</button>
    </div>`;
  };

  content.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div>
        <div class="section-header"><h3>⏳ Bekleyen (${pending.length})</h3></div>
        ${pending.length ? pending.map(renderTask).join('') : '<div class="empty"><div class="icon">🎉</div><p>Tüm görevler tamamlandı!</p></div>'}
      </div>
      <div>
        <div class="section-header"><h3>✅ Tamamlanan (${done.length})</h3></div>
        ${done.slice(0,10).map(renderTask).join('')}
      </div>
    </div>`;
}

async function toggleTask(id, checkbox) {
  await db.from('tasks').update({ is_done: checkbox.checked }).eq('id', id);
  renderTasks();
}

// ============================================================
// MODAL SYSTEM
// ============================================================
function openAddModal() {
  openModal(currentPage, 'add', {});
}

function openModal(type, mode, data) {
  modalType = type;
  modalMode = mode;
  editId = data?.id || null;

  const titles = { contacts:'Müşteri', listings:'Portföy İlanı', deals:'İşlem', tasks:'Görev' };
  document.getElementById('modal-title').textContent = (mode === 'add' ? 'Yeni ' : '') + (titles[type] || '') + (mode === 'edit' ? ' Düzenle' : '');

  const forms = { contacts: contactForm, listings: listingForm, deals: dealForm, tasks: taskForm };
  document.getElementById('modal-body').innerHTML = forms[type](data);
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
function closeModalOnOverlay(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

async function saveModal() {
  const getVal = id => document.getElementById(id)?.value || null;
  const getNum = id => { const v = getVal(id); return v ? parseFloat(v) : null; };
  const getInt = id => { const v = getVal(id); return v ? parseInt(v) : null; };

  let payload = {};

  if (modalType === 'contacts') {
    payload = {
      full_name: getVal('f_full_name'), phone: getVal('f_phone'), email: getVal('f_email'),
      tc_kimlik: getVal('f_tc'), contact_type: getVal('f_contact_type'), source: getVal('f_source'),
      budget_min: getNum('f_budget_min'), budget_max: getNum('f_budget_max'),
      preferred_districts: getVal('f_districts'), notes: getVal('f_notes'),
      assigned_agent_id: getVal('f_agent') || null, follow_up_date: getVal('f_follow_up') || null
    };
    if (!payload.full_name) { showToast('Ad Soyad zorunlu', true); return; }
  }

  if (modalType === 'listings') {
    payload = {
      title: getVal('f_title'), property_type: getVal('f_property_type'), deal_type: getVal('f_deal_type'),
      status: getVal('f_status'), city: getVal('f_city')||'İstanbul', district: getVal('f_district'),
      neighborhood: getVal('f_neighborhood'), address: getVal('f_address'), ada_parsel: getVal('f_ada'),
      tapu_type: getVal('f_tapu_type'), gross_m2: getNum('f_gross'), net_m2: getNum('f_net'),
      floor_number: getInt('f_floor'), total_floors: getInt('f_total_floors'), building_age: getInt('f_age'),
      rooms: getVal('f_rooms'), heating: getVal('f_heating'), price: getNum('f_price'),
      aidat: getNum('f_aidat'), ekb_class: getVal('f_ekb'), listing_url: getVal('f_url'),
      notes: getVal('f_notes'), assigned_agent_id: getVal('f_agent') || null
    };
    if (!payload.title || !payload.price) { showToast('Başlık ve fiyat zorunlu', true); return; }
  }

  if (modalType === 'deals') {
    const fp = getNum('f_final_price');
    const br = getNum('f_comm_buyer') || 2;
    const sr = getNum('f_comm_seller') || 2;
    const comm = fp ? fp * (br + sr) / 100 : null;
    payload = {
      deal_type: getVal('f_deal_type'), status: getVal('f_status'),
      asking_price: getNum('f_asking_price'), final_price: fp,
      commission_rate_buyer: br, commission_rate_seller: sr, commission_amount: comm,
      contract_date: getVal('f_contract_date') || null, tapu_date: getVal('f_tapu_date') || null,
      handover_date: getVal('f_handover') || null, notary_name: getVal('f_notary'),
      notes: getVal('f_notes'), assigned_agent_id: getVal('f_agent') || null
    };
  }

  if (modalType === 'tasks') {
    payload = {
      title: getVal('f_title'), task_type: getVal('f_task_type'),
      due_date: getVal('f_due_date') || null, notes: getVal('f_notes'),
      assigned_agent_id: getVal('f_agent') || null
    };
    if (!payload.title) { showToast('Görev başlığı zorunlu', true); return; }
  }

  let res;
  if (modalMode === 'add') {
    res = await db.from(modalType).insert([payload]);
  } else {
    res = await db.from(modalType).update(payload).eq('id', editId);
  }

  if (res.error) { showToast('Hata: ' + res.error.message, true); return; }
  showToast(modalMode === 'add' ? 'Kaydedildi ✓' : 'Güncellendi ✓');
  closeModal();
  const renders = { contacts: renderContacts, listings: renderListings, deals: renderDeals, tasks: renderTasks };
  renders[modalType]();
}

async function deleteRecord(table, id) {
  if (!confirm('Bu kaydı silmek istediğinizden emin misiniz?')) return;
  const { error } = await db.from(table).delete().eq('id', id);
  if (error) { showToast('Silme hatası: ' + error.message, true); return; }
  showToast('Silindi');
  navigate(currentPage);
}

      <option value="gorusme" ${d.status==='gorusme'?'selected':''}>Görüşme</option>
      <option value="teklif" ${d.status==='teklif'?'selected':''}>Teklif Verildi</option>
      <option value="sozlesme" ${d.status==='sozlesme'?'selected':''}>Sözleşme</option>
      <option value="kapandi" ${d.status==='kapandi'?'selected':''}>Kapandı</option>
      <option value="iptal" ${d.status==='iptal'?'selected':''}>İptal</option>
    </select></div>
    <div class="form-group"><label>İstenen Fiyat (₺)</label><input id="f_asking_price" type="number" value="${d.asking_price||''}"/></div>
    <div class="form-group"><label>Satış Fiyatı (₺)</label><input id="f_final_price" type="number" value="${d.final_price||''}" oninput="calcComm()"/></div>

function taskForm(d={}) {
  return `<div class="form-grid">
    <div class="form-group full"><label>Görev Başlığı *</label><input id="f_title" value="${d.title||''}"/></div>
    <div class="form-group"><label>Görev Türü</label><select id="f_task_type">
      ${['arama','gosterim','randevu','tapu','noter','belediye','diger'].map(v=>`<option value="${v}" ${d.task_type===v?'selected':''}>${taskTypeName(v)}</option>`).join('')}
    </select></div>
    <div class="form-group"><label>Tarih / Saat</label><input id="f_due_date" type="datetime-local" value="${d.due_date ? d.due_date.slice(0,16) : ''}"/></div>
    <div class="form-group"><label>Danışman</label><select id="f_agent"><option value="">— Seçiniz —</option>${agentOptions(d.assigned_agent_id)}</select></div>
    <div class="form-group full"><label>Notlar</label><textarea id="f_notes">${d.notes||''}</textarea></div>
  </div>`;
}

function calcComm() {
  const fp = parseFloat(document.getElementById('f_final_price')?.value) || 0;
  const br = parseFloat(document.getElementById('f_comm_buyer')?.value) || 0;
  const sr = parseFloat(document.getElementById('f_comm_seller')?.value) || 0;
  const comm = fp * (br + sr) / 100;
  const el = document.getElementById('comm_display');
  if (el) el.textContent = comm > 0 ? formatPrice(comm) + ' ₺' : '—';
}

// ============================================================
// HELPERS
// ============================================================
function formatPrice(n) {
  if (!n) return '0';
  return Math.round(n).toLocaleString('tr-TR');
}

function statusBadge(s) {
  const map = { aktif:'green', opsiyonda:'orange', satildi:'blue', kiraland:'blue', pasif:'gray' };
  const names = { aktif:'Aktif', opsiyonda:'Opsiyonda', satildi:'Satıldı', kiraland:'Kiralandı', pasif:'Pasif' };
  return `<span class="badge badge-${map[s]||'gray'}">${names[s]||s}</span>`;
}

function dealStatusBadge(s) {
  const map = { gorusme:'blue', teklif:'orange', sozlesme:'orange', kapandi:'green', iptal:'red' };
  const names = { gorusme:'Görüşme', teklif:'Teklif', sozlesme:'Sözleşme', kapandi:'Kapandı', iptal:'İptal' };
  return `<span class="badge badge-${map[s]||'gray'}">${names[s]||s}</span>`;
}

function contactTypeName(t) {
  return { alici:'Alıcı', satici:'Satıcı', kiracı:'Kiracı', ev_sahibi:'Ev Sahibi' }[t] || t;
}

function sourceName(s) {
  return { referans:'Referans', sahibinden:'Sahibinden', emlakjet:'Emlakjet', instagram:'Instagram', facebook:'Facebook', tabela:'Tabela', diger:'Diğer' }[s] || s || '-';
}

function taskTypeName(t) {
  return { arama:'📞 Arama', gosterim:'🏠 Gösterim', randevu:'📅 Randevu', tapu:'📋 Tapu', noter:'✍️ Noter', belediye:'🏛️ Belediye', diger:'📌 Diğer' }[t] || t;
}

function showToast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

// ============================================================
// START
// ============================================================
init();
